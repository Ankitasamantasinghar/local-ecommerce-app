<!DOCTYPE html>
<html>
<head>
    <title>LocalStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.95)!important; backdrop-filter: blur(10px); }
        .hero { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 60px 0; margin-bottom: 40px; border-radius: 0 0 50px 50px; }
        .product-card { border: none; border-radius: 20px; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .product-img { height: 250px; object-fit: cover; }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; border-radius: 25px; padding: 10px 25px; }
        .price-tag { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showPage('home')">
                <i class="fas fa-store"></i> LocalStore
            </a>
            <div class="ms-auto">
                <button onclick="showPage('cart')" class="btn btn-gradient me-2">
                    <i class="fas fa-shopping-cart"></i> Cart <span id="cart-count">0</span>
                </button>
                <button onclick="showPage('track')" class="btn btn-outline-primary">Track Order</button>
            </div>
        </div>
    </nav>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="hero text-center">
            <div class="container">
                <h1 class="display-4 fw-bold">Welcome to LocalStore 🛍️</h1>
                <p class="lead">Shop the best products from your local area</p>
            </div>
        </div>
        <div class="container pb-5">
            <div class="row g-4" id="products-list"></div>
        </div>
    </div>

    <!-- CART PAGE -->
    <div id="cart" class="page">
        <div class="container py-5">
            <div class="bg-white p-4 rounded-4 shadow">
                <h2 class="mb-4">🛒 Your Cart</h2>
                <div id="cart-content"></div>
                <div class="mt-3"><a href="#" onclick="showPage('home')">← Continue Shopping</a></div>
            </div>
        </div>
    </div>

    <!-- TRACK PAGE -->
    <div id="track" class="page">
        <div class="container py-5">
            <div class="bg-white p-4 rounded-4 shadow col-md-6 mx-auto">
                <h2 class="mb-4">Track Your Order</h2>
                <input id="track-id" class="form-control mb-3" placeholder="Enter Order ID">
                <button onclick="trackOrder()" class="btn btn-primary w-100">Track</button>
                <div id="track-result"></div>
                <div class="text-center mt-3"><a href="#" onclick="showPage('home')">← Back to Shop</a></div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
